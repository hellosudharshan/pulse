<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#0c0a09" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#27272a" stroke-width="8" stroke-dasharray="16 12" />
  <!-- Simple neon glowing pulse wave -->
  <path d="M 60,256 L 160,256 L 190,120 L 230,380 L 270,180 L 300,290 L 330,220 L 360,256 L 452,256" 
        fill="none" stroke="#10b981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)" />
  <path d="M 60,256 L 160,256 L 190,120 L 230,380 L 270,180 L 300,290 L 330,220 L 360,256 L 452,256" 
        fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="230" cy="380" r="10" fill="#10b981" />
  <circle cx="190" cy="120" r="10" fill="#10b981" />
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
