<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Pulse Focus &amp; Timer</title>
    
    <!-- PWA primary details -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0c0a09" />
    
    <!-- Apple Safari iOS standalone experience configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    
    <!-- Microsoft / Windows integration -->
    <meta name="msapplication-TileColor" content="#0c0a09" />
    <meta name="msapplication-tap-highlight" content="no" />
  </head>
  <body class="bg-[#0c0a09] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker immediately -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[Service Worker] Registration successful with scope:', reg.scope);
              
              // Direct message to force update checks if desired
              reg.update();
            })
            .catch((err) => {
              console.error('[Service Worker] Registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
